name: Release CI

on:
  push:
    branches: 
      - '**'
  workflow_dispatch: 

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Extract and sanitize branch name
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          echo "safe_branch=${SAFE_BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Build Periphery binary
        run: cargo build --release --bin periphery --target ${{ matrix.target }}

      - name: Upload Periphery binary to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: periphery-binary-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/periphery
          retention-days: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Core
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-core
          tags: |
            type=raw,value=${{ steps.branch.outputs.safe_branch }}-${{ matrix.arch }}

      - name: Build and push Core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/core/single-arch.Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}

      - name: Extract metadata for Periphery
        id: meta-periphery
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-periphery
          tags: |
            type=raw,value=${{ steps.branch.outputs.safe_branch }}-${{ matrix.arch }}

      - name: Build and push Periphery image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/periphery/single-arch.Dockerfile
          push: true
          tags: ${{ steps.meta-periphery.outputs.tags }}
          labels: ${{ steps.meta-periphery.outputs.labels }}

  merge-manifests:
    name: Create Multi-Arch Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and sanitize branch name
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          echo "safe_branch=${SAFE_BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Create and push Core manifest
        run: |
          BRANCH=${{ steps.branch.outputs.safe_branch }}
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-core
          docker buildx imagetools create -t $IMAGE:$BRANCH \
            $IMAGE:$BRANCH-amd64 \
            $IMAGE:$BRANCH-arm64

      - name: Create and push Periphery manifest
        run: |
          BRANCH=${{ steps.branch.outputs.safe_branch }}
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-periphery
          docker buildx imagetools create -t $IMAGE:$BRANCH \
            $IMAGE:$BRANCH-amd64 \
            $IMAGE:$BRANCH-arm64
