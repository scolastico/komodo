name: Release CI

on:
  push:
    branches: 
      - '**'
  workflow_dispatch: 

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Environment Variables
        run: |
          # Ensures repository name is fully lowercase for GHCR
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          
          # Extracts branch name, replaces slashes with dashes, and lowercases it
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          SAFE_BRANCH_NAME=$(echo "$SAFE_BRANCH_NAME" | tr '[:upper:]' '[:lower:]')
          echo "SAFE_BRANCH=${SAFE_BRANCH_NAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Binaries image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/binaries.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-binaries:${{ env.SAFE_BRANCH }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Periphery binary
        run: |
          # Pull the freshly built binaries image
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-binaries:${{ env.SAFE_BRANCH }}-${{ matrix.arch }}
          docker pull $IMAGE
          
          # Create a temporary container to extract the compiled binary
          docker create --name extract $IMAGE /periphery
          docker cp extract:/periphery ./periphery-binary
          docker rm extract

      - name: Upload Periphery binary to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: periphery-binary-linux-${{ matrix.arch }}
          path: ./periphery-binary
          retention-days: 5

      - name: Extract metadata for Core
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-core
          tags: type=raw,value=${{ env.SAFE_BRANCH }}-${{ matrix.arch }}

      - name: Build and push Core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/core/single-arch.Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          build-args: |
            BINARIES_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-binaries:${{ env.SAFE_BRANCH }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Periphery
        id: meta-periphery
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-periphery
          tags: type=raw,value=${{ env.SAFE_BRANCH }}-${{ matrix.arch }}

      - name: Build and push Periphery image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/periphery/single-arch.Dockerfile
          push: true
          tags: ${{ steps.meta-periphery.outputs.tags }}
          labels: ${{ steps.meta-periphery.outputs.labels }}
          build-args: |
            BINARIES_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-binaries:${{ env.SAFE_BRANCH }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    name: Create Multi-Arch Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Environment Variables
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          SAFE_BRANCH_NAME=$(echo "$SAFE_BRANCH_NAME" | tr '[:upper:]' '[:lower:]')
          echo "SAFE_BRANCH=${SAFE_BRANCH_NAME}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push Core manifest
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-core
          BRANCH=${{ env.SAFE_BRANCH }}
          docker buildx imagetools create -t $IMAGE:$BRANCH \
            $IMAGE:$BRANCH-amd64 \
            $IMAGE:$BRANCH-arm64

      - name: Create and push Periphery manifest
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-periphery
          BRANCH=${{ env.SAFE_BRANCH }}
          docker buildx imagetools create -t $IMAGE:$BRANCH \
            $IMAGE:$BRANCH-amd64 \
            $IMAGE:$BRANCH-arm64
